version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pg-server-compose
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: seaweedfs-server
    command: server -dir=/data -s3 -filer
    ports:
      - "8333:8333" # S3 API port
      - "8888:8888" # Filer port
      - "9333:9333" # Master port
    volumes:
      - seaweeddata:/data
    restart: always

volumes:
  pgdata:
  seaweeddata:
